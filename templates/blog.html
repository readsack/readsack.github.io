<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>readsack writes</title>
<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Lexend:wght@100..900&display=swap');
    strong{
        color: yellow
    }
    body {
        margin: 0;
        padding: 0;
        background-color: rgb(15, 15, 15);
        display: flex;
        height: 100vh;
        align-items: center;
        justify-content: center;
        color: white;
        font-family: Lexend;
        cursor: crosshair;
        user-select: none;
    }

    .yellow {
        color: yellow;
        display: inline-block;
    }

    .frame {
        border: 3px solid rgb(200, 200, 200);
        width: 50vw;
        height:85vh;
        overflow: scroll;
        scrollbar-width: none;
        display: flex;
        flex-direction: column;
        padding: 20px;
    }

    .date {
        font-size: 20px;
    }

    .title {
        font-size: 50px;
    }

    a {
        color: yellow
    }


    ::-webkit-scrollbar {
        display: none;
    }

    a:link {
        color: inherit
    }

    a:active {
        color: inherit
    }

    a:visited {
        color: inherit
    }

    a:hover {
        color: inherit
    }


    @media (max-width: 576px) {
        .frame {
            width: 90vw;
            height: 90vh;
        }
    }

    @media (max-width: 992px) {
        .frame {
            width: 80vw;
            height: 80vh;
        }
    }
</style>

<body>


    <div class="frame">
        <div class="yellow"><a href="/" class="yellow"><- Go back</a></div>
        <div class="title">{{.BlogTitle}}</div>
        <div class="date yellow">{{.Date}}</div>
        <div class="content">
            {{.Content}}
        </div>
    </div>
</body>

</html>
